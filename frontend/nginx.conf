server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Підтримка React Router (всі маршрути ведуть на index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy на бекенд. Працює, коли VITE_API_URL=/api/v1
    # (тобто у проді — frontend і backend під одним доменом).
    # У dev-режимі цей блок просто не використовується, бо там фронт
    # бʼє безпосередньо в http://localhost:8000.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Кешування статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
